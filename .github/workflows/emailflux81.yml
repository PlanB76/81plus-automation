name: EMAILFLUX81 · worker 24/7
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}
concurrency: { group: emailflux81, cancel-in-progress: false }
jobs:
  send:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: emailflux81 } }
    env:
      EMAIL81_DB: 81plus.db
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_DIR:  ${{ secrets.FTP_DIR }}
      FTP_DB_PATH: ${{ secrets.FTP_DB_PATH }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      BASE_URL:  https://81plus.net
      PEXELS_KEY: ${{ secrets.PEXELS_API_KEY }}
      DRY_RUN:   ${{ secrets.DRY_RUN }}
      DAILY_CAP: ${{ secrets.DAILY_CAP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Scarica DB dall'host (contatti restano sull'host)
        run: python ftp_db.py get
      - name: Worker invio (rispetta DAILY_CAP, anti-spam, DRY_RUN)
        run: python e81_run.py
      - name: Ricarica DB aggiornato sull'host
        if: always()
        run: python ftp_db.py put
