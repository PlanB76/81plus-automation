name: YOUTUBE81 Evergreen 24-7

on:
  schedule:
    - cron: "30 6 * * *"
    - cron: "30 12 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evergreen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install google-api-python-client google-auth google-auth-oauthlib pillow

      - run: |
          python cloud/youtube_evergreen_cloud.py
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      - name: Save state
        run: |
          git config user.name "YOUTUBE81 BOT"
          git config user.email "bot@81plus.net"
          git add cloud_state || true
          git commit -m "update evergreen state" || true
          git push || true
