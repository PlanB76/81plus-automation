name: SICURIX Shorts · kie.ai render + upload YouTube
on:
  schedule:
    - cron: '30 5 * * *'   # 07:30 IT: genera e carica i 3 short del giorno
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --quiet google-api-python-client google-auth google-auth-oauthlib
      - name: kie.ai render 3 short + upload YT
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          KIE_REF_IMAGE: ${{ secrets.KIE_REF_IMAGE }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YT_PRIVACY: ${{ vars.YT_PRIVACY }}
        run: python cloud/kie_video.py
      - name: Commit report
        run: |
          git config user.name "kie-bot"; git config user.email "bot@81plus.net"
          git add KIE_SHORTS_REPORT.json || true
          git commit -m "kie shorts $(date +%F)" || echo "nulla"
          git push || echo "push skip"
