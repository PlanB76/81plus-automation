name: YTCASHCOW81+ Global (riciclo YT + SOCIAL81+)
on:
  schedule:
    - cron: '30 12 * * *'   # 14:30 IT — riciclo video vecchi (batch 1)
    - cron: '30 16 * * *'   # 18:30 IT — riciclo video vecchi (batch 2) + social
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --quiet google-api-python-client google-auth google-auth-oauthlib pillow
      - name: YTCASHCOW81+ (riciclo + TG) + SOCIAL81+ pack
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python cloud/ytcashcow81.py
          python cloud/social81_pack.py
      - name: Commit report
        run: |
          git config user.name "ytcashcow-bot"; git config user.email "bot@81plus.net"
          git add YTCASHCOW_REPORT.md SOCIAL81_OGGI.md cloud_state/ytcashcow_state.json || true
          git commit -m "YTCASHCOW81+ $(date +%F)" || echo "nulla"
          git push || echo "push skip"
