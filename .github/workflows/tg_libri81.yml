# TG LIBRI 81+ · posta a rotazione i libri Amazon sul canale Telegram (caption divertente)
name: TG LIBRI 81+
on:
  schedule:
    - cron: "0 11,18 * * *"   # 2 libri al giorno (UTC)
  workflow_dispatch: {}
concurrency:
  group: tg-libri81
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  libri:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
      SICURIX_TG_TOKEN:   ${{ secrets.SICURIX_TG_TOKEN }}
      SICURIX_TG_CHANNEL: ${{ secrets.SICURIX_TG_CHANNEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Posta un libro su Telegram
        run: python tg_libri81/tg_libri81.py
      - name: Salva lo stato
        run: |
          git config user.name  "libri81-bot"
          git config user.email "bot@81plus.net"
          git add -A
          git commit -m "TG LIBRI 81+ giro $(date -u +%FT%TZ)" || echo "nulla da committare"
          git push || echo "push saltato"
