name: SICURIX TALES · sync Drive + ottimizza vignette
on:
  schedule:
    - cron: '0 4 * * 1'   # ogni lunedì 06:00 IT: risincronizza dalla cartella Drive
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --quiet gdown pillow
      - name: Sync Drive + compressione WebP
        env: { TALES_DRIVE_FOLDERS: ${{ vars.TALES_DRIVE_FOLDERS }} }
        run: python cloud/tales_optimize.py
      - name: Commit vignette ottimizzate
        run: |
          git config user.name "tales-bot"; git config user.email "bot@81plus.net"
          git add tales_web cloud/data/tales_manifest.json || true
          git commit -m "TALES vignette ottimizzate $(date +%F)" || echo "nulla"
          git push || echo "push skip"
