name: BLOG81+ & PACK81+ Machine

on:
  schedule:
    - cron: '0 6 * * *'      # ogni giorno 06:00 UTC: 1 articolo + ciclo pack (crea/riapre/scade)
  workflow_dispatch:
    inputs:
      send:
        description: "Pubblica davvero su canali (true/false)"
        default: "true"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Scheduler (articolo + pack + iniezione index/blog)
        working-directory: BLOG81plus
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          TG_BOT_TOKEN:      ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL:        ${{ secrets.TG_CHANNEL }}
          FB_TOKEN:          ${{ secrets.FB_TOKEN }}
          IG_TOKEN:          ${{ secrets.IG_TOKEN }}
          EMAIL_PROVIDER_KEY: ${{ secrets.EMAIL_PROVIDER_KEY }}
          EMAIL_LIST_ID:      ${{ secrets.EMAIL_LIST_ID }}
        run: python3 engine/scheduler.py ${{ (github.event.inputs.send == 'false') && ' ' || '--send' }}

      - name: Commit output (blog, promo, index, registry)
        run: |
          git config user.name  "blog81-bot"
          git config user.email "bot@81plus.net"
          git add blog81.html blog promo index.html BLOG81plus/data || true
          git commit -m "BLOG81+ auto $(date -u +%F) — articolo + pack cycle" || echo "nessuna modifica"
          git push || echo "push saltato"
