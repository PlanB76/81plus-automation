name: SICU81 Fliki Daily Dispatch
on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 IT (05:00 UTC) ogni giorno
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Genera i 3 prompt Fliki di oggi + notifica TG
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHANNEL: ${{ vars.TG_CHANNEL }}
        run: python cloud/fliki_daily.py
      - name: Commit OGGI_FLIKI.md
        run: |
          git config user.name "sicu81-bot"; git config user.email "bot@81plus.net"
          git add OGGI_FLIKI.md cloud/data/fliki_queue.json || true
          git commit -m "Fliki dispatch $(date +%F)" || echo "nulla da committare"
          git push || echo "push skip"
