name: YTCASHCOW81+ · SEO Backfill H24 (auto + ciclo 18gg)
# Pipeline automatica: RECHECK (ri-ottimizza i video che non crescono) -> GENERA metadati (AUTO) -> APPLICA a YouTube.
# Quota-safe: ~80 video/giro; in ~3-4 giorni copre tutti i ~280 video, poi entra nel ciclo di miglioramento continuo.
# APPLY reale solo se il Secret YOUTUBE_TOKEN_JSON e' presente; altrimenti gira in dry-run (scrive solo i CSV).
on:
  schedule:
    - cron: '0 5 * * *'      # ogni giorno 07:00 IT
  workflow_dispatch:
    inputs:
      apply:
        description: "yes = applica a YouTube (default). no = solo genera i CSV (dry-run)."
        required: false
        default: "yes"
      limit:
        description: "max video da APPLICARE per giro (quota YouTube). Default 80."
        required: false
        default: "80"
permissions:
  contents: write
concurrency:
  group: yt-cashcow-seo
  cancel-in-progress: false
jobs:
  seo:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
      YT_CHANNEL_ID:      ${{ vars.YT_CHANNEL_ID }}
      YT_SEO_AUTO:        "1"
      YT_SEO_SKIP_DONE:   "1"
      YT_APPLY_THUMB:     "1"
      YT_APPLY_LIMIT:     ${{ github.event.inputs.limit || '80' }}
      RECHECK_DAYS:       "18"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Dipendenze
        run: pip install --quiet google-api-python-client google-auth google-auth-oauthlib pillow youtube-transcript-api
      - name: Baseline (fotografia canale)
        run: python cloud/yt_cashcow/yt_baseline.py || echo "baseline skip"
      - name: GENERA metadati SEO (AUTO -> CSV)
        run: python cloud/yt_cashcow/yt_cashcow_seo.py || echo "seo skip"
      - name: APPLICA a YouTube (auto, ~80/giro; solo APPROVA=SI)
        if: ${{ github.event.inputs.apply != 'no' }}
        run: python cloud/yt_cashcow/yt_cashcow_apply.py || echo "apply skip"
      - name: Salva CSV/stato/report nel repo
        run: |
          git config user.name  "cashcow-seo-bot"
          git config user.email "bot@81plus.net"
          git pull --rebase --autostash || true
          git add cloud_state/yt_seo_review.csv cloud_state/yt_baseline.csv cloud_state/yt_baseline.md \
                  cloud_state/yt_seo_applied.log cloud_state/yt_seo_rollback.csv \
                  cloud_state/yt_perf_track.json cloud_state/yt_variant.json cloud_state/yt_recheck.log 2>/dev/null || true
          git commit -m "YTCASHCOW SEO auto $(date -u +%FT%TZ)" || echo "nulla da committare"
          git push || echo "push saltato"
